name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a new push doesn't queue behind stale CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings
      # Lint every optional feature too: `mock` (mockall + generated mocks) and
      # `tracing` (the per-command observability events).
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS exercises the `other.rs` (no-containment) path of vcs-process.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - run: cargo build --all-targets
      - run: cargo test
      # Exercise every optional feature: the mock layer (automock + ScriptedRunner)
      # and the `tracing` per-command events.
      - run: cargo test --workspace --all-features

  audit:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Scan the dependency tree for security advisories and banned/duplicate crates.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans

  package:
    name: cargo package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Hard gate: vcs-process has no workspace deps, so it packages and
      # verify-builds fully — catches missing files or bad metadata before publish.
      - run: cargo package -p vcs-process
      # The wrappers depend on vcs-process by `version`, so `cargo package` (even
      # with --no-verify) rejects them with "no matching package named
      # vcs-process" until vcs-process is on crates.io. That's expected, not a CI
      # failure — emit a notice instead of failing the job. Once vcs-process is
      # published this packages cleanly and starts catching wrapper metadata bugs.
      - name: Package wrappers (needs vcs-process on crates.io first)
        run: |
          for c in vcs-git vcs-jj vcs-github; do
            cargo package -p "$c" --no-verify \
              || echo "::notice::$c packaging skipped — publish vcs-process to crates.io first"
          done
