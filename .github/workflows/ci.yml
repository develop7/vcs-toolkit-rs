name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy
      - run: cargo clippy --all-targets -- -D warnings
      # The `mock` feature pulls in mockall and the generated mocks; lint it too.
      - run: cargo clippy --workspace --all-targets --features mock -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - run: cargo build --all-targets
      - run: cargo test
      # Exercise the mock layer: automock-generated mocks + ScriptedRunner tests.
      - run: cargo test --workspace --features mock

  package:
    name: cargo package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Hard gate: vcs-process has no workspace deps, so it packages and
      # verify-builds fully — catches missing files or bad metadata before publish.
      - run: cargo package -p vcs-process
      # The wrappers depend on vcs-process by `version`, so `cargo package` (even
      # with --no-verify) rejects them with "no matching package named
      # vcs-process" until vcs-process is on crates.io. That's expected, not a CI
      # failure — emit a notice instead of failing the job. Once vcs-process is
      # published this packages cleanly and starts catching wrapper metadata bugs.
      - name: Package wrappers (needs vcs-process on crates.io first)
        run: |
          for c in vcs-git vcs-jj vcs-github; do
            cargo package -p "$c" --no-verify \
              || echo "::notice::$c packaging skipped — publish vcs-process to crates.io first"
          done
