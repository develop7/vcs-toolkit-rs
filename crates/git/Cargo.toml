[package]
name = "vcs-git"
version = "0.1.0"
description = "Automate the Git CLI from Rust through process execution."
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[dependencies]
# Runs `git` inside an OS job (Windows Job Object / Linux cgroup) so the process
# tree is killed on close — no orphaned subprocesses. Also the `Runner` seam.
vcs-process.workspace = true
# Auto-generated `MockGitApi` for consumers' tests. Test-only — enabled only via
# the `mock` feature, never compiled into production builds.
mockall = { version = "0.13", optional = true }

[features]
# Expose the `mockall`-generated `MockGitApi` (and pull in vcs-process's mocks).
mock = ["dep:mockall", "vcs-process/mock"]

[dev-dependencies]
