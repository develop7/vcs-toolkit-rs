[package]
name = "vcs-process"
version = "0.1.0"
description = "Launch child processes inside an OS job (Windows Job Object / Linux cgroup v2) so the whole process tree dies with the parent."
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[dependencies]
# Async process spawning + timeout: tokio::process drives git/jj/gh, tokio::time
# enforces deadlines, io-util writes stdin asynchronously.
tokio = { version = "1", features = ["process", "time", "io-util"] }
# `async fn` in the object-safe `Runner`/`*Api` traits (dyn + mockall friendly).
async-trait = "0.1"
# Structured `CommandError` carrying program/args/exit code/stderr/timeout.
thiserror = "2"
# Auto-generated mocks of the `Runner` trait (MockRunner). Test-only — pulled in
# only when the `mock` feature is enabled, never in production builds.
mockall = { version = "0.13", optional = true }

[features]
# Expose `mockall`-generated mocks (e.g. `MockRunner`) for consumers' tests.
mock = ["dep:mockall"]

[target.'cfg(windows)'.dependencies]
# Win32 Job Object FFI: CreateJobObject / SetInformationJobObject /
# AssignProcessToJobObject / TerminateJobObject + the HANDLE type & CloseHandle.
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_System_JobObjects",
    # JOBOBJECT_EXTENDED_LIMIT_INFORMATION lives behind this.
    "Win32_System_Threading",
    # CreateJobObjectW's signature references SECURITY_ATTRIBUTES.
    "Win32_Security",
] }

[target.'cfg(target_os = "linux")'.dependencies]
# Raw syscalls the cgroup path can't express via std: getpid/write into
# cgroup.procs (async-signal-safe, in pre_exec) and kill/killpg for teardown
# and the process-group fallback.
libc = "0.2"

[dev-dependencies]
# `#[tokio::test]` and a runtime to drive the async tests.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
