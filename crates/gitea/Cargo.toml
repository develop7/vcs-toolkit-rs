[package]
name = "vcs-gitea"
version = "0.1.0"
description = "Automate Gitea and Forgejo from Rust: a typed, async wrapper for the tea CLI — pull requests, issues, and releases."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"
keywords = ["gitea","forgejo","tea","cli","async"]
categories = ["command-line-utilities","api-bindings","asynchronous"]

[dependencies]
# Runs `tea` inside an OS job (Windows Job Object / Linux cgroup) so the process
# tree is killed on close — no orphaned subprocesses. Also the `ProcessRunner`
# seam, `CliClient` core, and structured `Error`.
processkit.workspace = true
# Shared processkit-coupled plumbing: the argv injection guard (`reject_flag_like`).
vcs-cli-support = { path = "../cli-support", version = "0.1" }
# Deserialize `tea … --output json` output into typed structs (PullRequest).
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# `async fn` in the object-safe `GiteaApi` trait (dyn + mockall friendly).
async-trait = "0.1"
# Auto-generated `MockGiteaApi` for consumers' tests. Test-only — enabled only
# via the `mock` feature, never compiled into production builds.
mockall = { version = "0.13", optional = true }

[features]
# Expose the `mockall`-generated `MockGiteaApi` (and pull in processkit's mocks).
mock = ["dep:mockall", "processkit/mock"]
# Emit a `tracing` event per command run (forwards to processkit's `tracing`).
tracing = ["processkit/tracing"]

[dev-dependencies]
# `#[tokio::test]` for the async unit/integration tests.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
# Property-test the `tea` print-table parsers for panic-freedom on arbitrary /
# malformed input (tea's `--output json` shape is empirically reverse-engineered).
proptest = "1"

[package.metadata.docs.rs]
# Build docs.rs with every feature so the optional surfaces (mock / tracing /
# serde / stream) are documented (defaults alone hide them), and pass
# `--cfg docsrs` so feature-gated items render an "Available on feature `x`" badge.
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true
