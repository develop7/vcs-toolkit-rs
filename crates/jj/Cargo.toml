[package]
name = "vcs-jj"
version = "0.1.0"
description = "Automate the Jujutsu (jj) CLI from Rust through process execution."
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"

[dependencies]
# Runs `jj` inside an OS job (Windows Job Object / Linux cgroup) so the process
# tree is killed on close — no orphaned subprocesses. Also the `Runner` seam,
# `CommandError`, and timeouts.
vcs-process.workspace = true
# `async fn` in the object-safe `JjApi` trait (dyn + mockall friendly).
async-trait = "0.1"
# Auto-generated `MockJjApi` for consumers' tests. Test-only — enabled only via
# the `mock` feature, never compiled into production builds.
mockall = { version = "0.13", optional = true }

[features]
# Expose the `mockall`-generated `MockJjApi` (and pull in vcs-process's mocks).
mock = ["dep:mockall", "vcs-process/mock"]

[dev-dependencies]
# `#[tokio::test]` for the async unit/integration tests.
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
